name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Type · Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # `uv sync` creates a project-local virtualenv (installing the requested
      # Python if needed) and installs the package + dev extra into it. We then
      # invoke tools with `uv run` so nothing touches the runner's externally
      # managed system Python.
      - name: Sync environment (Python ${{ matrix.python-version }})
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Ruff lint
        run: uv run ruff check --output-format=github src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest --cov=aegisforge --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  # Dependency & secret hygiene on the tool's own codebase. AegisForge must hold
  # itself to the standard it enforces on others.
  self-audit:
    name: Self audit (deps · secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Export a locked requirements set and audit it with an ephemeral
      # pip-audit (uvx), avoiding any system-Python install. Advisories are
      # surfaced as warnings for now; Phase 1.5 makes this a hard gate.
      - name: pip-audit (dependency vulnerabilities)
        run: |
          uv export --format requirements-txt --no-emit-project -o /tmp/reqs.txt
          uvx pip-audit -r /tmp/reqs.txt || echo "::warning::pip-audit reported advisories"
