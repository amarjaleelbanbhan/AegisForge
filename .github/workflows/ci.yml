name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Type · Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # `uv sync` only installs packages the (virtual) root project depends
      # on; since the root is a pure workspace manifest (ADR-0005), every
      # member must be synced explicitly with --all-packages. Tools are then
      # invoked with `uv run` so nothing touches the runner's externally
      # managed system Python.
      - name: Sync workspace (Python ${{ matrix.python-version }})
        run: uv sync --all-packages --extra dev --python ${{ matrix.python-version }}

      - name: Ruff lint
        run: uv run ruff check --output-format=github packages

      - name: Ruff format check
        run: uv run ruff format --check packages

      # Run once per package rather than across the whole workspace: every
      # package's tests/ has its own conftest.py, and with no __init__.py
      # under tests/ (see pyproject.toml's [tool.pytest.ini_options] note),
      # a single combined mypy invocation would see two same-named
      # top-level "conftest" modules and refuse to proceed.
      - name: Mypy (strict, per package)
        run: |
          for pkg in packages/*/; do
            echo "::group::mypy $pkg"
            uv run mypy "${pkg}src" "${pkg}tests"
            echo "::endgroup::"
          done

      - name: Import boundaries (hexagonal architecture)
        run: uv run lint-imports

      - name: Pytest (with coverage gate)
        run: |
          uv run pytest --cov=cortexward --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=100

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  # Dogfooding: CortexWard scans itself with its own multi-scanner `ward
  # scan` (bandit + detect-secrets + OSV) instead of standalone bandit,
  # scoped to packages/*/src only (same scope the old bandit-only step
  # used) — ward scan takes one root at a time, so this loops per package.
  # cortexward-baseline.json (repo root) records any accepted false
  # positive by fingerprint; today it's empty, since scanning src alone
  # (no test fixtures, which is where this repo's only known false
  # positives — fake secrets, shell=True examples — actually live) is
  # already clean. Regenerate it with `ward baseline <path>` if that
  # changes.
  dogfood:
    name: Dogfood security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages --extra dev

      - name: ward scan (self-scan, packages/*/src)
        run: |
          for pkg in packages/*/; do
            if [ -d "${pkg}src" ]; then
              echo "::group::ward scan ${pkg}src"
              uv run ward scan "${pkg}src" --baseline cortexward-baseline.json --fail-on high
              echo "::endgroup::"
            fi
          done

  # Dependency & secret hygiene, and a software bill of materials, on the
  # tool's own codebase. CortexWard must hold itself to the standard it
  # enforces on others.
  self-audit:
    name: Self audit (deps · secrets · SBOM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Export a locked, third-party-only requirements set (workspace members
      # are local editable installs with no CVE surface of their own) and
      # audit it with an ephemeral pip-audit, avoiding any system-Python
      # install.
      - name: Export locked third-party requirements
        run: |
          uv export --all-packages --format requirements-txt --no-emit-project \
            -o /tmp/requirements.txt
          grep -v '^-e ' /tmp/requirements.txt > /tmp/requirements.third-party.txt

      # Blocking: an advisory that never fails the build isn't a gate. If a
      # future advisory has no fixed version yet available, use pip-audit's
      # own --ignore-vuln <ID> (with a comment explaining why) rather than
      # reintroducing a blanket "|| warning" that silences every future one.
      - name: pip-audit (dependency vulnerabilities)
        run: uvx pip-audit -r /tmp/requirements.third-party.txt

      - name: Generate CycloneDX SBOM
        run: |
          uvx --from cyclonedx-bom cyclonedx-py requirements \
            /tmp/requirements.third-party.txt --of JSON -o sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: warn

  # The Dockerfile has no other verification: it isn't exercised by the
  # quality job (that runs directly on the runner's own uv-managed venv,
  # never inside the image) and nothing else builds it. Without this job,
  # the image can silently drift out of sync with the rest of the
  # workspace -- exactly what happened before this job existed, when the
  # Dockerfile only installed cortexward-core and its CMD was a placeholder
  # stub that predated the ward CLI entirely.
  docker-build:
    name: Docker image builds and runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the image
        run: docker build -t cortexward:ci .

      - name: Smoke test -- ward --help runs as the entrypoint
        run: docker run --rm cortexward:ci --help | grep -q "CortexWard"

      - name: Smoke test -- runs as the unprivileged cortex user
        run: |
          uid="$(docker run --rm --entrypoint id cortexward:ci -u)"
          test "$uid" = "10001"

      - name: Write a deliberately vulnerable fixture to scan
        run: |
          mkdir -p /tmp/docker-scan-fixture
          cat > /tmp/docker-scan-fixture/vuln.py <<'EOF'
          import subprocess


          def run(cmd):
              subprocess.call(cmd, shell=True)
          EOF

      - name: Smoke test -- ward scan finds the vulnerability inside the container
        run: |
          docker run --rm -v /tmp/docker-scan-fixture:/workspace:ro cortexward:ci \
            scan . --fail-on none | grep -q '"ruleId"'
