# cortexward-llm — the owned LLM abstraction (MPS §14, ADR-0006): LLMPort
# adapters and the cost-aware model router. No capability outside this
# package may depend on a specific provider SDK type. Depends on
# cortexward-core for the LLMPort/EmbeddingPort contracts.
[build-system]
requires = ["hatchling>=1.31.0"]
build-backend = "hatchling.build"

[project]
name = "cortexward-llm"
version = "0.1.0.dev0"
description = "CortexWard LLM abstraction: LLMPort adapters and the cost-aware model router."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "CortexWard Contributors" }]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Quality Assurance",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]

dependencies = [
  "cortexward-core",
  "pyyaml>=6.0,<7",
]

[project.urls]
Homepage = "https://github.com/amarjaleelbanbhan/CortexWard"
Repository = "https://github.com/amarjaleelbanbhan/CortexWard"

[project.entry-points."cortexward.llm"]
ollama = "cortexward.llm.ollama_adapter:OllamaAdapter"
openai = "cortexward.llm.openai_compatible_adapter:OpenAICompatibleAdapter"
anthropic = "cortexward.llm.anthropic_adapter:AnthropicAdapter"
gemini = "cortexward.llm.gemini_adapter:GeminiAdapter"

[tool.uv.sources]
cortexward-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/cortexward"]
