# cortexward-agents — the agent framework (MPS §13-§15): RunState, the
# Agent protocol, the seven agents (Planner, Scanner, Verifier, Repair,
# Reviewer, Coordinator, Memory), memory abstractions, prompt templates,
# and LLM-resilience/tool-invocation primitives. Depends on cortexward-core,
# cortexward-llm, and cortexward-scanners (for scanning + correlation).
[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "cortexward-agents"
version = "0.1.0.dev0"
description = "CortexWard's agent framework: RunState, agents, memory, and LLM resilience."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "CortexWard Contributors" }]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Quality Assurance",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]

dependencies = [
  "cortexward-core",
  "cortexward-llm",
  "cortexward-scanners",
]

[project.urls]
Homepage = "https://github.com/amarjaleelbanbhan/CortexWard"
Repository = "https://github.com/amarjaleelbanbhan/CortexWard"

[tool.uv.sources]
cortexward-core = { workspace = true }
cortexward-llm = { workspace = true }
cortexward-scanners = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/cortexward"]
