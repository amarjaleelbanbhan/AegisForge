# cortexward-cpg — the Code Property Graph engine and the Python reference
# LanguageProvider (MPS §12). Depends on cortexward-core for the CodeGraph /
# LanguageProvider port contracts and the SourceLocation domain type; the
# core never depends back on this package (enforced by import-linter).
[build-system]
requires = ["hatchling>=1.31.0"]
build-backend = "hatchling.build"

[project]
name = "cortexward-cpg"
version = "0.1.0.dev0"
description = "CortexWard Code Property Graph engine and language providers."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "CortexWard Contributors" }]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Quality Assurance",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]

dependencies = [
  "cortexward-core",
  "pydantic>=2.7,<3",
  "tree-sitter>=0.23,<1",
  "tree-sitter-python>=0.23,<1",
]

[project.urls]
Homepage = "https://github.com/amarjaleelbanbhan/CortexWard"
Repository = "https://github.com/amarjaleelbanbhan/CortexWard"

[project.entry-points."cortexward.languages"]
python = "cortexward.languages.python:PythonLanguageProvider"

[tool.uv.sources]
cortexward-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/cortexward"]
