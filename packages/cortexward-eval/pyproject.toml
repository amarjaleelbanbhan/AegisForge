# cortexward-eval — the benchmark-first evaluation harness (MPS §23,
# docs/benchmark/evaluation-framework.md). Depends on cortexward-core for
# the Finding domain model and SourceLocation; every subsequent capability
# is measured against this package from the moment it exists (ADR-0007).
[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "cortexward-eval"
version = "0.1.0.dev0"
description = "CortexWard benchmark-first evaluation harness: metrics, RunManifest, statistical protocol."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "CortexWard Contributors" }]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Quality Assurance",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]

dependencies = [
  "cortexward-core",
  "pydantic>=2.7,<3",
]

[project.urls]
Homepage = "https://github.com/amarjaleelbanbhan/CortexWard"
Repository = "https://github.com/amarjaleelbanbhan/CortexWard"

[tool.uv.sources]
cortexward-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/cortexward"]
