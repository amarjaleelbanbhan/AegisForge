# cortexward-reporters — output-format adapters implementing ReporterPort
# (ADR-0003, MPS §17.1): SARIF, VEX, SBOM, Markdown, ... Depends on
# cortexward-core for the port contract and the Finding domain model; the
# internal Finding model stays richer than any single external format and is
# never coupled to one.
[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "cortexward-reporters"
version = "0.1.0.dev0"
description = "CortexWard report-format adapters (SARIF, VEX, SBOM, ...)."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "CortexWard Contributors" }]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Quality Assurance",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]

dependencies = [
  "cortexward-core",
]

[project.urls]
Homepage = "https://github.com/amarjaleelbanbhan/CortexWard"
Repository = "https://github.com/amarjaleelbanbhan/CortexWard"

[project.entry-points."cortexward.reporters"]
sarif = "cortexward.reporters.sarif:SarifReporter"
cortexward-json = "cortexward.reporters.json_reporter:JsonReporter"

[tool.uv.sources]
cortexward-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/cortexward"]
