# cortexward-cli — the `ward` command-line interface (MPS §8, Phase 8).
# Depends on cortexward-orchestrator (build_pipeline() picks between
# SequentialOrchestrator and the agent-driven pipeline) and
# cortexward-reporters (SARIF/JSON export) to wire the already-built scan
# pipeline into an actual runnable tool. Also depends on cortexward-llm
# directly for LLMProviderConfig/load_llm_config, to turn `--llm-*` CLI
# flags into the config build_pipeline() takes — no direct dependency on
# cortexward-agents; the CLI only knows about OrchestratorPort. `ward serve`
# needs cortexward-server (so `uvicorn.run("cortexward.server.app:app", ...)`
# resolves) and uvicorn itself; both are hard dependencies, not an optional
# extra, so `ward serve` genuinely works out of the box. `ward bench` needs
# cortexward-eval (Dataset/RunManifest/run_bench) -- this is the one place
# a delivery surface depends on the evaluation harness, matching how
# cortexward-eval's own import-linter contract note anticipated it.
[build-system]
requires = ["hatchling>=1.31.0"]
build-backend = "hatchling.build"

[project]
name = "cortexward-cli"
version = "0.1.0.dev0"
description = "The `ward` command-line interface for CortexWard."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "CortexWard Contributors" }]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Quality Assurance",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
  "Environment :: Console",
]

dependencies = [
  "cortexward-core",
  "cortexward-eval",
  "cortexward-llm",
  "cortexward-orchestrator",
  "cortexward-reporters",
  "cortexward-server",
  "rich>=13.8.0",
  "typer>=0.12,<1",
  "uvicorn[standard]>=0.51.0,<1",
]

[project.urls]
Homepage = "https://github.com/amarjaleelbanbhan/CortexWard"
Repository = "https://github.com/amarjaleelbanbhan/CortexWard"

[project.scripts]
ward = "cortexward.cli.main:main"

[tool.uv.sources]
cortexward-core = { workspace = true }
cortexward-eval = { workspace = true }
cortexward-llm = { workspace = true }
cortexward-orchestrator = { workspace = true }
cortexward-reporters = { workspace = true }
cortexward-server = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/cortexward"]
