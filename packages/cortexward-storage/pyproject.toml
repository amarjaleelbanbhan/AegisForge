# cortexward-storage — StoragePort adapters (MPS §17.1, §19, ADR-0008).
# Depends on cortexward-core for the port contract, FindingEvent, and the
# shared materialize_finding() replay logic. No other adapter dependency —
# storage is a peer-isolated adapter family, same as cortexward-vcs/-llm.
[build-system]
requires = ["hatchling>=1.31.0"]
build-backend = "hatchling.build"

[project]
name = "cortexward-storage"
version = "0.1.0.dev0"
description = "CortexWard StoragePort adapters (SQLite, ...) for the event-sourced finding log."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "CortexWard Contributors" }]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Quality Assurance",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]

dependencies = [
  "cortexward-core",
]

[project.urls]
Homepage = "https://github.com/amarjaleelbanbhan/CortexWard"
Repository = "https://github.com/amarjaleelbanbhan/CortexWard"

[project.entry-points."cortexward.storage"]
sqlite = "cortexward.storage.sqlite_adapter:SqliteStoragePort"

[tool.uv.sources]
cortexward-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/cortexward"]
