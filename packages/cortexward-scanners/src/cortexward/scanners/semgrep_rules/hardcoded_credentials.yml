rules:
  - id: cortexward-hardcoded-credential-assignment
    languages: [python]
    severity: WARNING
    message: >-
      A variable named like a credential (password/secret/API key/token) is
      assigned a literal string. Complements detect-secrets' entropy-based
      detection with a syntactic, name-based signal -- the two tools finding
      the same real leak via different mechanisms strengthens (not
      duplicates) the evidence when correlated.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)^(password|passwd|pwd|secret|api_key|apikey|access_token|auth_token|private_key)$
